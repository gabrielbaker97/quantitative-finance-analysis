name: Live Crypto TAA

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer afhængigheder
        run: pip install -r live-taa/requirements.txt

      - name: Kør strategi
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: cd live-taa && python live_taa_crypto.py

      - name: Gem signal-log til repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live-taa/results/live_crypto_taa/signal_log.csv
          git diff --cached --quiet || git commit -m "chore: signal log $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
